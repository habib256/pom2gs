# POMIIGS configuration — read at startup from the repo root.
# `key = value`, `#` starts a comment. CLI arguments override these.

# What to boot:
#   gsos / finder  → GS/OS to the Finder desktop from a slot-5 3.5" disk
#   hdd            → the slot-7 ProDOS hard disk (boots `hdd =` below)
# `hdv/GSOS.hdv` now holds a full GS/OS 6.0.1 install with a ProDOS boot block,
# so `boot = hdd` starts GS/OS straight from the hard disk. Switch back to
# `boot = gsos` to run the Installer / boot a 3.5" disk again.
boot = hdd

# 800K GS/OS disk for `boot = gsos` (.2mg / .po), relative to repo root.
# For an install run this is the Installer (Disk 1): it boots to the "Apple IIGS
# Installer" window — pick the hard disk (below) as the target with "Change Disk",
# then "Easy Update". The Installer prompts for the other disks; hot-swap them from
# the "3.5\" Drive" menu. (Or boot "Disk 2 of 7 System Disk" to the Finder and copy
# a System Folder onto the HDD by hand.)
# In `boot = hdd` this disk is mounted alongside the HDD so the 3.5" drive is
# ONLINE from boot — hot-swapping other disks from the menu then auto-mounts.
disk35 = disks35/System 6.0.1/Disk 6 of 7 synthLAB.2mg

# ProDOS hard disk (.hdv / .2mg / .po):
#   boot = hdd   → boots this disk (must be bootable, e.g. Total Replay).
#   boot = gsos  → if this is a *blank/non-bootable* install target (e.g.
#                  hdv/GSOS.hdv), it is mounted on slot 7 alongside the 3.5"
#                  installer so you can format + install GS/OS onto it; writes
#                  persist to the image. A *bootable* HDD is skipped in gsos mode
#                  (it would hijack the boot) — use `boot = hdd` for that.
hdd = hdv/GSOS.hdv

# Optional ROM override (else auto-detects roms/iigs-rom03.rom then rom01):
# rom = roms/iigs-rom03.rom
